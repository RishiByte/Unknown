<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Atelier | Culinary Management</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        charcoal: { DEFAULT: '#1a1a1a', light: '#2a2a2a', dark: '#0f0f0f' },
                        cream: { DEFAULT: '#f5f1e8', dark: '#e6ded1' },
                        gold: { light: '#e8c962', DEFAULT: '#d4af37', dark: '#b08d27' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.8s ease-out forwards',
                        'slide-up': 'slideUp 0.8s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { transform: 'translateY(20px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
                    }
                }
            }
        }
    </script>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #f5f1e8;
            color: #1a1a1a;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .glass-nav {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .glass-card {
            background: white;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card-no-hover {
            background: white;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .hover-lift:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(212, 175, 55, 0.15), 0 8px 10px -6px rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.4);
        }

        .gold-gradient-text {
            background: linear-gradient(135deg, #d4af37, #f3e5ab, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f5f1e8;
        }

        ::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #b08d27;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.3);
            border-color: #d4af37;
        }

        .spinner {
            border: 4px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            border-top: 4px solid #d4af37;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, createContext, useContext } = React;

        // --- HOOKS ---
        function useDebounce(value, delay) {
            const [debouncedValue, setDebouncedValue] = useState(value);
            useEffect(() => {
                const handler = setTimeout(() => { setDebouncedValue(value); }, delay);
                return () => clearTimeout(handler);
            }, [value, delay]);
            return debouncedValue;
        }

        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.error("Local storage error", error);
                    return initialValue;
                }
            });
            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error("Local storage set error", error);
                }
            };
            return [storedValue, setValue];
        }

        // --- UTILS ---
        const getIngredients = (meal) => {
            let ing = [];
            for (let i = 1; i <= 20; i++) {
                if (meal[`strIngredient${i}`] && meal[`strIngredient${i}`].trim() !== '') {
                    ing.push({ name: meal[`strIngredient${i}`], measure: meal[`strMeasure${i}`] });
                }
            }
            return ing;
        };

        const generateMockStats = (id) => {
            const numericId = parseInt(id) || 12345;
            return {
                difficulty: numericId % 3 === 0 ? 'Hard' : numericId % 2 === 0 ? 'Medium' : 'Easy',
                calories: (numericId % 600) + 300, // 300-900 kcal
                prepTime: (numericId % 45) + 15 // 15-60 mins
            };
        };

        // --- CONTEXT ---
        const AppContext = createContext();

        // --- COMPONENTS ---

        const LoadingScreen = () => (
            <div className="fixed inset-0 bg-charcoal z-50 flex flex-col items-center justify-center">
                <i className="fa-solid fa-utensils text-gold text-4xl animate-bounce mb-6"></i>
                <h2 className="font-serif text-3xl gold-gradient-text tracking-wider">L'Atelier</h2>
                <div className="mt-8 w-48 h-1 bg-charcoal-light rounded-full overflow-hidden">
                    <div className="h-full bg-gold animate-pulse-slow w-full origin-left" style={{ animationDuration: '1.5s' }}></div>
                </div>
            </div>
        );

        const Header = ({ currentView, setCurrentView }) => (
            <header className="fixed top-0 left-0 right-0 z-40 glass-nav animate-fade-in text-white">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div className="flex justify-between items-center h-20">
                        <div className="flex items-center gap-3 cursor-pointer group" onClick={() => setCurrentView('dashboard')}>
                            <i className="fa-solid fa-bell-concierge text-gold text-2xl group-hover:rotate-12 transition-transform duration-300"></i>
                            <span className="font-serif text-2xl tracking-widest font-semibold hidden sm:block">L'ATELIER</span>
                        </div>
                        <nav className="hidden md:flex items-center gap-8 font-sans text-sm tracking-wide">
                            <button onClick={() => setCurrentView('dashboard')} className={`${currentView === 'dashboard' ? 'text-gold border-b-2 border-gold' : 'text-gray-300 hover:text-gold'} pb-1 transition-all`}>Dashboard</button>
                            <button onClick={() => setCurrentView('generator')} className={`${currentView === 'generator' ? 'text-gold border-b-2 border-gold' : 'text-gray-300 hover:text-gold'} pb-1 transition-all`}>AI Generator</button>
                            <button onClick={() => setCurrentView('menu')} className={`${currentView === 'menu' ? 'text-gold border-b-2 border-gold' : 'text-gray-300 hover:text-gold'} pb-1 transition-all`}>Menu</button>
                            <button onClick={() => setCurrentView('inventory')} className={`${currentView === 'inventory' ? 'text-gold border-b-2 border-gold' : 'text-gray-300 hover:text-gold'} pb-1 transition-all`}>Inventory</button>
                            <button onClick={() => setCurrentView('optimizer')} className={`${currentView === 'optimizer' ? 'text-gold border-b-2 border-gold' : 'text-gray-300 hover:text-gold'} pb-1 transition-all`}>Optimizer</button>
                        </nav>
                        <div className="flex items-center gap-6">
                            <div className="flex items-center gap-3 cursor-pointer pl-4 lg:border-l border-gray-700">
                                <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Chef&backgroundColor=d4af37" alt="Chef Profile" className="w-9 h-9 rounded-full border-2 border-gold object-cover" />
                                <div className="hidden sm:block">
                                    <p className="text-sm font-medium">Chef Auguste</p>
                                    <p className="text-xs text-gray-400">Executive Chef</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </header>
        );

        /* --- Reusable Components --- */
        const RecipeCard = ({ meal, actions = [], showNutrition = false, targetCalories = null }) => {
            const stats = generateMockStats(meal.idMeal);
            const ingredients = getIngredients(meal);

            // Score calc for optimizer
            let score = 0;
            if (targetCalories) {
                const diff = Math.abs(stats.calories - targetCalories);
                score = Math.max(0, 100 - (diff / targetCalories) * 100).toFixed(0);
            }

            return (
                <div className="glass-card-no-hover hover-lift rounded-2xl overflow-hidden group flex flex-col h-full relative">
                    {targetCalories && (
                        <div className={`absolute top-4 right-4 z-20 px-3 py-1 rounded-full text-xs font-bold text-white shadow-lg ${score > 80 ? 'bg-green-500' : score > 50 ? 'bg-yellow-500' : 'bg-red-500'}`}>
                            {score}% Match
                        </div>
                    )}
                    <div className="h-48 overflow-hidden relative">
                        <div className="absolute inset-0 bg-charcoal/30 z-10 transition-colors group-hover:bg-transparent"></div>
                        <img src={meal.strMealThumb} alt={meal.strMeal} className="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700 ease-out" />
                        <div className="absolute bottom-4 left-4 z-20 flex gap-2">
                            <span className="px-2 py-1 bg-black/60 backdrop-blur rounded text-xs text-white font-medium shadow-md">
                                {stats.difficulty}
                            </span>
                            <span className="px-2 py-1 bg-black/60 backdrop-blur rounded text-xs text-gold font-medium shadow-md">
                                <i className="fa-regular fa-clock mr-1"></i>{stats.prepTime}m
                            </span>
                        </div>
                    </div>
                    <div className="p-5 flex flex-col flex-grow bg-white">
                        <h4 className="font-serif text-xl font-bold text-charcoal mb-2 line-clamp-1">{meal.strMeal}</h4>
                        <p className="text-xs text-gold font-medium mb-3 uppercase tracking-wider">{meal.strCategory} &bull; {meal.strArea}</p>

                        {showNutrition && (
                            <div className="mb-4 grid grid-cols-2 gap-2 text-xs border-y border-gray-100 py-3">
                                <div><span className="text-gray-500 block">Calories</span><span className="font-bold text-charcoal">{stats.calories} kcal</span></div>
                                <div><span className="text-gray-500 block">Est. Yield</span><span className="font-bold text-charcoal">4 Servings</span></div>
                            </div>
                        )}

                        <div className="mt-auto pt-4 flex flex-wrap gap-2">
                            {actions.map((action, idx) => (
                                <button key={idx} onClick={() => action.onClick(meal)} className={`flex-1 min-w-[120px] py-2 px-3 rounded-lg text-sm font-semibold transition-all ${action.primary ? 'bg-charcoal text-gold hover:bg-black' : 'bg-cream text-charcoal hover:bg-gold/20'}`}>
                                    <i className={`${action.icon} mr-2`}></i>{action.label}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            )
        };

        /* --- View: Dashboard --- */
        const DashboardView = ({ setCurrentView }) => {
            const { inventory, savedRecipes, feedbacks } = useContext(AppContext);

            // Calculate fake efficiency trend based on saved recipes
            const efficiency = Math.min(100, 80 + savedRecipes.length * 2);

            // Aggregate feedback
            const avgRating = Object.values(feedbacks).length > 0
                ? (Object.values(feedbacks).reduce((acc, curr) => acc + curr.rating, 0) / Object.values(feedbacks).length).toFixed(1)
                : 'N/A';

            return (
                <div className="animate-fade-in">
                    <div className="mb-12">
                        <h1 className="font-serif text-4xl md:text-5xl font-bold text-charcoal mb-4">
                            Good Evening, <span className="gold-gradient-text italic">Chef Auguste.</span>
                        </h1>
                        <p className="text-gray-600 max-w-2xl text-lg font-light">
                            The dinner service approaches. Your kitchen is primed, inventory is stable, and new AI-optimized seasonal recipes await your review.
                        </p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
                        <div className="glass-card rounded-2xl p-6 flex flex-col justify-between animate-slide-up" style={{ animationDelay: '0.1s' }}>
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm text-gray-500 font-medium mb-1 uppercase">Active Inventory</p>
                                    <h3 className="font-serif text-3xl font-bold text-charcoal">{inventory.length} Items</h3>
                                </div>
                                <div className="p-3 bg-cream rounded-full border border-gold/30"><i className="fa-solid fa-boxes-stacked text-gold"></i></div>
                            </div>
                        </div>
                        <div className="glass-card rounded-2xl p-6 flex flex-col justify-between animate-slide-up" style={{ animationDelay: '0.2s' }}>
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm text-gray-500 font-medium mb-1 uppercase">Saved Recipes</p>
                                    <h3 className="font-serif text-3xl font-bold text-charcoal">{savedRecipes.length}</h3>
                                </div>
                                <div className="p-3 bg-cream rounded-full border border-gold/30"><i className="fa-solid fa-book-open text-gold"></i></div>
                            </div>
                        </div>
                        <div className="glass-card rounded-2xl p-6 flex flex-col justify-between animate-slide-up" style={{ animationDelay: '0.3s' }}>
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm text-gray-500 font-medium mb-1 uppercase">Avg Feedback</p>
                                    <h3 className="font-serif text-3xl font-bold text-charcoal"><i className="fa-solid fa-star text-gold text-2xl mr-2"></i>{avgRating}</h3>
                                </div>
                                <div className="p-3 bg-cream rounded-full border border-gold/30"><i className="fa-solid fa-comment-dots text-gold"></i></div>
                            </div>
                        </div>
                        <div className="glass-card rounded-2xl p-6 flex flex-col justify-between animate-slide-up" style={{ animationDelay: '0.4s' }}>
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-sm text-gray-500 font-medium mb-1 uppercase">Resource Effic.</p>
                                    <h3 className="font-serif text-3xl font-bold text-charcoal">{efficiency}%</h3>
                                </div>
                                <div className="p-3 bg-cream rounded-full border border-gold/30"><i className="fa-solid fa-chart-pie text-gold"></i></div>
                            </div>
                        </div>
                    </div>

                    <div className="flex justify-between items-end mb-8 animate-fade-in" style={{ animationDelay: '0.5s' }}>
                        <h2 className="font-serif text-2xl text-charcoal font-semibold border-l-4 border-gold pl-4">Core Stations</h2>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-16">
                        <div onClick={() => setCurrentView('generator')} className="glass-card rounded-2xl overflow-hidden group hover-lift cursor-pointer flex flex-col animate-slide-up" style={{ animationDelay: '0.6s' }}>
                            <div className="h-40 relative bg-charcoal">
                                <img src="https://images.unsplash.com/photo-1577106263724-2c8e03bfe9cf?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" className="w-full h-full object-cover opacity-50 group-hover:opacity-100 transition-opacity duration-500" />
                                <div className="absolute top-4 left-4 z-20 w-10 h-10 rounded-full bg-white flex items-center justify-center"><i className="fa-solid fa-wand-magic-sparkles text-gold"></i></div>
                            </div>
                            <div className="p-6 bg-white flex-1">
                                <h4 className="font-serif text-xl font-bold text-charcoal mb-2 group-hover:text-gold transition-colors">AI Recipe Generator</h4>
                                <p className="text-sm text-gray-600">Search MealDB variants based on your inspiration and improvise ingredients.</p>
                            </div>
                        </div>

                        <div onClick={() => setCurrentView('menu')} className="glass-card rounded-2xl overflow-hidden group hover-lift cursor-pointer flex flex-col animate-slide-up" style={{ animationDelay: '0.7s' }}>
                            <div className="h-40 relative bg-charcoal">
                                <img src="https://images.unsplash.com/photo-1544025162-d76694265947?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" className="w-full h-full object-cover opacity-50 group-hover:opacity-100 transition-opacity duration-500" />
                                <div className="absolute top-4 left-4 z-20 w-10 h-10 rounded-full bg-white flex items-center justify-center"><i className="fa-solid fa-layer-group text-gold"></i></div>
                            </div>
                            <div className="p-6 bg-white flex-1">
                                <h4 className="font-serif text-xl font-bold text-charcoal mb-2 group-hover:text-gold transition-colors">Digital Menu & Feedback</h4>
                                <p className="text-sm text-gray-600">Review selected dishes, gather guest ratings and manage overall menu appeal.</p>
                            </div>
                        </div>

                        <div onClick={() => setCurrentView('inventory')} className="glass-card rounded-2xl overflow-hidden group hover-lift cursor-pointer flex flex-col animate-slide-up" style={{ animationDelay: '0.8s' }}>
                            <div className="h-40 relative bg-charcoal">
                                <img src="https://images.unsplash.com/photo-1589010588553-46e8e7c21788?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" className="w-full h-full object-cover opacity-50 group-hover:opacity-100 transition-opacity duration-500" />
                                <div className="absolute top-4 left-4 z-20 w-10 h-10 rounded-full bg-white flex items-center justify-center"><i className="fa-solid fa-box-open text-gold"></i></div>
                            </div>
                            <div className="p-6 bg-white flex-1">
                                <h4 className="font-serif text-xl font-bold text-charcoal mb-2 group-hover:text-gold transition-colors">Smart Kitchen Inventory</h4>
                                <p className="text-sm text-gray-600">Manage real-time supplies, mark items low and trigger recipe auto-suggestions.</p>
                            </div>
                        </div>

                        <div onClick={() => setCurrentView('optimizer')} className="glass-card rounded-2xl overflow-hidden group hover-lift cursor-pointer flex flex-col animate-slide-up" style={{ animationDelay: '0.9s' }}>
                            <div className="h-40 relative bg-charcoal">
                                <img src="https://images.unsplash.com/photo-1600565193348-f74bd3c7ccdf?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" className="w-full h-full object-cover opacity-50 group-hover:opacity-100 transition-opacity duration-500" />
                                <div className="absolute top-4 left-4 z-20 w-10 h-10 rounded-full bg-white flex items-center justify-center"><i className="fa-solid fa-scale-balanced text-gold"></i></div>
                            </div>
                            <div className="p-6 bg-white flex-1">
                                <h4 className="font-serif text-xl font-bold text-charcoal mb-2 group-hover:text-gold transition-colors">Recipe Optimizer</h4>
                                <p className="text-sm text-gray-600">Filter dishes tightly against nutritional targets to secure highest margin variants.</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        /* --- View: AI Generator --- */
        const AIGeneratorView = () => {
            const { savedRecipes, setSavedRecipes } = useContext(AppContext);
            const [query, setQuery] = useState('');
            const debouncedQuery = useDebounce(query, 600);
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [improviseMode, setImproviseMode] = useState(null);

            useEffect(() => {
                if (!debouncedQuery) { setResults([]); return; }
                const fetchRecipes = async () => {
                    setLoading(true);
                    try {
                        const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${debouncedQuery}`);
                        const data = await res.json();
                        setResults((data.meals || []).slice(0, 3)); // Show 3 variants
                    } catch (e) {
                        console.error('Failed to fetch recipes', e);
                    }
                    setLoading(false);
                };
                fetchRecipes();
            }, [debouncedQuery]);

            const handleSave = (meal) => {
                if (!savedRecipes.find(r => r.idMeal === meal.idMeal)) {
                    setSavedRecipes([...savedRecipes, meal]);
                    alert(`${meal.strMeal} saved to favorites!`);
                } else {
                    alert(`${meal.strMeal} is already saved.`);
                }
            };

            const triggerImprovise = (meal) => {
                setImproviseMode(meal);
                // Mock substitution effect
                setTimeout(() => {
                    alert(`Improvisation Suggestion for ${meal.strMeal}:\n\nSubstitute standard oil with Truffle Oil for luxury depth.\nSwap ${getIngredients(meal)[0]?.name || 'main carb'} with locally sourced alternative.`);
                    setImproviseMode(null);
                }, 1000);
            };

            return (
                <div className="animate-fade-in">
                    <div className="mb-10 text-center">
                        <h2 className="font-serif text-3xl text-charcoal mb-3">AI Recipe Generator</h2>
                        <p className="text-gray-500 max-w-xl mx-auto">Describe your vision or key ingredients, and the AI will summon three optimal culinary paths from the global MealDB index.</p>
                    </div>

                    <div className="max-w-2xl mx-auto mb-12 relative">
                        <div className="absolute inset-y-0 left-4 flex items-center pointer-events-none">
                            <i className="fa-solid fa-wand-sparkles text-gold text-lg"></i>
                        </div>
                        <input
                            type="text"
                            value={query}
                            onChange={(e) => setQuery(e.target.value)}
                            placeholder="E.g., Chicken, Pasta, Spicy, Vegan..."
                            className="w-full bg-white border-2 border-gray-200 text-charcoal font-medium rounded-full py-4 pl-12 pr-6 shadow-sm focus:border-gold transition-colors text-lg"
                        />
                        {loading && (
                            <div className="absolute inset-y-0 right-4 flex items-center">
                                <div className="spinner w-6 h-6 border-2 border-t-2"></div>
                            </div>
                        )}
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        {loading && <div className="col-span-3 text-center py-10 text-gray-400">Consulting culinary database...</div>}
                        {!loading && query && results.length === 0 && (
                            <div className="col-span-3 text-center py-10 text-red-400">No divine inspiration found for that query. Try broader strokes.</div>
                        )}
                        {!loading && results.map(meal => (
                            <RecipeCard
                                key={meal.idMeal}
                                meal={meal}
                                actions={[
                                    { label: 'Save', icon: 'fa-regular fa-bookmark', onClick: handleSave, primary: true },
                                    { label: improviseMode?.idMeal === meal.idMeal ? 'Thinking...' : 'Improvise', icon: 'fa-solid fa-lightbulb', onClick: triggerImprovise }
                                ]}
                            />
                        ))}
                    </div>
                </div>
            );
        };

        /* --- View: Digital Menu & Feedback Analyzer --- */
        const MenuAnalyzerView = () => {
            const { savedRecipes, feedbacks, setFeedbacks } = useContext(AppContext);
            const [selectedMealId, setSelectedMealId] = useState(null);
            const [ratingInput, setRatingInput] = useState(5);
            const [commentInput, setCommentInput] = useState('');

            const handleAddFeedback = () => {
                if (!selectedMealId) return;
                const newFeedbacks = { ...feedbacks };
                if (!newFeedbacks[selectedMealId]) {
                    newFeedbacks[selectedMealId] = { rating: ratingInput, comments: [] };
                } else {
                    // Moving avg mock
                    newFeedbacks[selectedMealId].rating = (newFeedbacks[selectedMealId].rating + ratingInput) / 2;
                }
                if (commentInput) {
                    newFeedbacks[selectedMealId].comments.push(commentInput);
                }
                setFeedbacks(newFeedbacks);
                setCommentInput('');
                alert('Feedback logged to ledger.');
            };

            return (
                <div className="animate-fade-in grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="lg:col-span-2">
                        <h2 className="font-serif text-3xl text-charcoal mb-3 border-l-4 border-gold pl-4">Digital Menu Ledger</h2>
                        <p className="text-gray-500 mb-8">Manage saved recipes and observe guest reactions.</p>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {savedRecipes.length === 0 ? (
                                <p className="text-gray-400 italic col-span-2">Menu is empty. Save recipes from the generator first.</p>
                            ) : (
                                savedRecipes.map(meal => (
                                    <div key={meal.idMeal}
                                        className={`glass-card-no-hover p-4 flex gap-4 cursor-pointer transition-colors ${selectedMealId === meal.idMeal ? 'border-gold bg-gold/5' : 'hover:border-gold/50'}`}
                                        onClick={() => setSelectedMealId(meal.idMeal)}>
                                        <img src={meal.strMealThumb} className="w-16 h-16 rounded object-cover shadow-sm" />
                                        <div>
                                            <h5 className="font-serif font-bold text-charcoal line-clamp-1">{meal.strMeal}</h5>
                                            <div className="text-gold text-xs mt-1">
                                                <i className="fa-solid fa-star mr-1"></i>
                                                {feedbacks[meal.idMeal] ? feedbacks[meal.idMeal].rating.toFixed(1) : 'No Ratings'}
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    <div className="glass-card-no-hover rounded-2xl p-6 bg-white self-start sticky top-24">
                        <h3 className="font-serif text-xl border-b border-gray-100 pb-3 mb-4">Feedback Engine</h3>
                        {!selectedMealId ? (
                            <p className="text-sm text-gray-500">Select a dish from the menu to analyze or submit feedback.</p>
                        ) : (
                            <div>
                                <h4 className="font-bold text-charcoal mb-4">{savedRecipes.find(r => r.idMeal === selectedMealId)?.strMeal}</h4>
                                <div className="mb-4">
                                    <label className="block text-xs uppercase text-gray-500 font-bold mb-2">Guest Rating (1-5)</label>
                                    <input type="range" min="1" max="5" value={ratingInput} onChange={e => setRatingInput(Number(e.target.value))} className="w-full accent-gold" />
                                    <div className="text-center font-bold text-gold mt-2 text-lg">{ratingInput} Stars</div>
                                </div>
                                <div className="mb-4">
                                    <label className="block text-xs uppercase text-gray-500 font-bold mb-2">Tasting Notes</label>
                                    <textarea value={commentInput} onChange={e => setCommentInput(e.target.value)} rows="3" className="w-full border border-gray-300 rounded p-2 text-sm bg-gray-50" placeholder="e.g. Needs more salt, exceptional plating..."></textarea>
                                </div>
                                <button onClick={handleAddFeedback} className="w-full bg-charcoal text-white font-bold py-3 rounded-lg hover:bg-gold transition-colors">Commit Feedback</button>

                                {feedbacks[selectedMealId]?.comments?.length > 0 && (
                                    <div className="mt-6 pt-4 border-t border-gray-100">
                                        <h5 className="text-xs font-bold text-gray-500 uppercase mb-3">Recent Comments</h5>
                                        <ul className="text-xs text-gray-600 space-y-2">
                                            {feedbacks[selectedMealId].comments.map((c, i) => (
                                                <li key={i} className="bg-cream p-2 rounded border-l-2 border-gold italic">"{c}"</li>
                                            ))}
                                        </ul>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        /* --- View: Smart Kitchen Inventory --- */
        const InventoryManagerView = ({ setCurrentView }) => {
            const { inventory, setInventory } = useContext(AppContext);
            const [newItemName, setNewItemName] = useState('');
            const [newItemQty, setNewItemQty] = useState('');

            const handleAddItem = (e) => {
                e.preventDefault();
                if (!newItemName || !newItemQty) return;
                const newItem = { id: Date.now(), name: newItemName, quantity: newItemQty, low: false };
                setInventory([...inventory, newItem]);
                setNewItemName(''); setNewItemQty('');
            };

            const toggleLow = (id) => {
                setInventory(inventory.map(item => item.id === id ? { ...item, low: !item.low } : item));
            };

            const deleteItem = (id) => {
                setInventory(inventory.filter(item => item.id !== id));
            };

            return (
                <div className="animate-fade-in grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div className="md:col-span-2">
                        <div className="flex justify-between items-end mb-6 border-b border-gray-200 pb-4">
                            <h2 className="font-serif text-3xl text-charcoal border-l-4 border-gold pl-4">Cold Room & Dry Store</h2>
                            <button onClick={() => setCurrentView('generator')} className="text-sm font-bold text-gold hover:text-charcoal"><i className="fa-solid fa-wand-magic-sparkles mr-2"></i>Auto-Suggest Meal</button>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-6">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-charcoal text-gold text-xs uppercase tracking-wider">
                                        <th className="p-4 rounded-tl-xl border-b border-gray-800">Ingredient Form</th>
                                        <th className="p-4 border-b border-gray-800">Volume/Qty</th>
                                        <th className="p-4 border-b border-gray-800 text-center">Status</th>
                                        <th className="p-4 rounded-tr-xl border-b border-gray-800 text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {inventory.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-gray-500 italic">Inventory is completely depleted.</td></tr>}
                                    {inventory.map(item => (
                                        <tr key={item.id} className="border-b border-gray-100 hover:bg-cream/50 transition-colors">
                                            <td className="p-4 font-medium text-charcoal">{item.name}</td>
                                            <td className="p-4 text-gray-600">{item.quantity}</td>
                                            <td className="p-4 text-center">
                                                <button onClick={() => toggleLow(item.id)} className={`px-3 py-1 rounded-full text-xs font-bold border transition-colors ${item.low ? 'bg-red-50 text-red-600 border-red-200 hover:bg-red-100' : 'bg-green-50 text-green-600 border-green-200 hover:bg-green-100'}`}>
                                                    {item.low ? 'LOW STOCK' : 'OPTIMAL'}
                                                </button>
                                            </td>
                                            <td className="p-4 text-right">
                                                <button onClick={() => deleteItem(item.id)} className="text-gray-400 hover:text-red-500 transition-colors"><i className="fa-solid fa-trash"></i></button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="glass-card-no-hover rounded-2xl p-6 bg-white self-start sticky top-24">
                        <h3 className="font-serif text-xl border-b border-gray-100 pb-3 mb-4"><i className="fa-solid fa-truck-ramp-box text-gold mr-2"></i>Receiving Cargo</h3>
                        <form onSubmit={handleAddItem}>
                            <div className="mb-4">
                                <label className="block text-xs uppercase text-gray-500 font-bold mb-2">Item Name</label>
                                <input type="text" value={newItemName} onChange={e => setNewItemName(e.target.value)} required className="w-full border border-gray-300 rounded p-2 text-sm bg-gray-50" placeholder="e.g. Saffron Threads" />
                            </div>
                            <div className="mb-6">
                                <label className="block text-xs uppercase text-gray-500 font-bold mb-2">Quantity & Measure</label>
                                <input type="text" value={newItemQty} onChange={e => setNewItemQty(e.target.value)} required className="w-full border border-gray-300 rounded p-2 text-sm bg-gray-50" placeholder="e.g. 500g, 2 cases" />
                            </div>
                            <button type="submit" className="w-full bg-gold text-charcoal font-bold py-3 rounded-lg hover:bg-yellow-500 shadow-md transition-all">Add to Manifest</button>
                        </form>
                    </div>
                </div>
            );
        };

        /* --- View: Recipe Optimizer --- */
        const RecipeOptimizerView = () => {
            const [query, setQuery] = useState('');
            const [calories, setCalories] = useState(600);
            const debouncedQuery = useDebounce(query, 600);
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                if (!debouncedQuery) { setResults([]); return; }
                const fetchRecipes = async () => {
                    setLoading(true);
                    try {
                        const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${debouncedQuery}`);
                        const data = await res.json();
                        setResults((data.meals || []).slice(0, 4));
                    } catch (e) {
                        console.error(e);
                    }
                    setLoading(false);
                };
                fetchRecipes();
            }, [debouncedQuery]);

            return (
                <div className="animate-fade-in">
                    <div className="mb-8 border-b-4 border-gold inline-block">
                        <h2 className="font-serif text-3xl text-charcoal mb-2">Recipe Optimizer Matrix</h2>
                    </div>

                    <div className="bg-charcoal text-white rounded-2xl p-6 mb-10 shadow-lg flex flex-col md:flex-row gap-6 items-end">
                        <div className="flex-1 w-full">
                            <label className="block text-xs uppercase text-gold font-bold mb-2">Target Recipe Type / Ingredient</label>
                            <input type="text" value={query} onChange={e => setQuery(e.target.value)} placeholder="e.g. Salmon" className="w-full bg-white/10 border border-gray-600 focus:border-gold rounded p-3 text-white placeholder-gray-400" />
                        </div>
                        <div className="flex-1 w-full">
                            <label className="block text-xs uppercase text-gold font-bold mb-2">Dietary Target (Calories: {calories})</label>
                            <input type="range" min="300" max="1200" step="50" value={calories} onChange={e => setCalories(Number(e.target.value))} className="w-full accent-gold mt-2" />
                            <div className="flex justify-between text-xs text-gray-400 mt-1">
                                <span>300 kcal (Lean)</span>
                                <span>1200 kcal (Indulgent)</span>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {loading && <div className="col-span-full text-center py-10 text-gray-500">Calculating nutrition density matrices...</div>}
                        {!loading && results.map(meal => (
                            <RecipeCard
                                key={meal.idMeal}
                                meal={meal}
                                showNutrition={true}
                                targetCalories={calories}
                                actions={[
                                    { label: 'View Spec', icon: 'fa-solid fa-microscope', onClick: () => alert(`Spec analysis for ${meal.strMeal} initialized.`), primary: false }
                                ]}
                            />
                        ))}
                    </div>
                </div>
            );
        };

        const Footer = () => (
            <footer className="bg-charcoal text-white pt-12 pb-8 mt-20 border-t border-gold/20">
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center text-xs text-gray-400">
                    <p>&copy; {new Date().getFullYear()} L'Atelier Management Inc.</p>
                    <p>Designed for Executive Precision.</p>
                </div>
            </footer>
        );

        /* --- MAIN APP --- */
        const App = () => {
            const [isLoading, setIsLoading] = useState(true);
            const [currentView, setCurrentView] = useState('dashboard'); // dashboard, generator, menu, inventory, optimizer

            useEffect(() => {
                const timer = setTimeout(() => { setIsLoading(false); }, 1500);
                return () => clearTimeout(timer);
            }, []);

            if (isLoading) return <LoadingScreen />;

            return (
                <AppProvider>
                    <div className="min-h-screen font-sans bg-[#fbf9f6] flex flex-col">
                        <Header currentView={currentView} setCurrentView={setCurrentView} />
                        <main className="pt-32 pb-10 flex-grow">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 min-h-[60vh]">
                                {currentView === 'dashboard' && <DashboardView setCurrentView={setCurrentView} />}
                                {currentView === 'generator' && <AIGeneratorView />}
                                {currentView === 'menu' && <MenuAnalyzerView />}
                                {currentView === 'inventory' && <InventoryManagerView setCurrentView={setCurrentView} />}
                                {currentView === 'optimizer' && <RecipeOptimizerView />}
                            </div>
                        </main>
                        <Footer />
                    </div>
                </AppProvider>
            );
        };

        const AppProvider = ({ children }) => {
            const [inventory, setInventory] = useLocalStorage('latelier_inventory', [
                { id: 1, name: 'Saffron Threads', quantity: '10g', low: false },
                { id: 2, name: 'Truffle Oil', quantity: '500ml', low: true }
            ]);
            const [savedRecipes, setSavedRecipes] = useLocalStorage('latelier_saved_recipes', []);
            const [feedbacks, setFeedbacks] = useLocalStorage('latelier_feedbacks', {});

            return <AppContext.Provider value={{ inventory, setInventory, savedRecipes, setSavedRecipes, feedbacks, setFeedbacks }}>{children}</AppContext.Provider>;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
